# Kit-repo CI: the offline, deterministic gates (typecheck / lint / unit tests).
# The live 11-gate QA suite needs a dev Convex deployment and stays a local
# maintainer gate (`cd template && bun run qa`); see README "QA 게이트".
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  template:
    name: template checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
